server.port=${PORT:8082}
spring.application.name=notification-service

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.ssl.enabled=${SPRING_RABBITMQ_SSL_ENABLED:false}

# SendGrid
spring.sendgrid.api-key=${SENDGRID_API_KEY}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=900000

# Logging
logging.level.com.healthcare.notificationservice=INFO
logging.level.org.springframework.web=INFO
spring.jpa.show-sql=false

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
