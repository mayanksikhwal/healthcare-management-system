server.port=${PORT:8082}
# server.port=8082
spring.application.name=notification-service

# RabbitMQ
# spring.rabbitmq.host=localhost
# spring.rabbitmq.port=5672
# spring.rabbitmq.username=guest
# spring.rabbitmq.password=guest

# DISABLE ALL RABBITMQ (MORE AGGRESSIVE)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
spring.rabbitmq.host=disabled

# SendGrid (Render) + Gmail (Local) Dual Config
# spring.mail.host=${SPRING_MAIL_HOST:smtp.sendgrid.net}
# spring.mail.port=${SPRING_MAIL_PORT:587}
# spring.mail.username=${MAIL_USERNAME:${SPRING_MAIL_USERNAME}}
# spring.mail.password=${MAIL_PASSWORD:${SPRING_MAIL_PASSWORD}}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# spring.mail.properties.mail.smtp.ssl.trust=smtp.sendgrid.net

# SENDGRID API 
spring.sendgrid.api-key=${SENDGRID_API_KEY}

# H2 DATABASE (Render)
spring.datasource.url=jdbc:h2:mem:notificationsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET}
jwt.expiration=900000

springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.healthcare.notificationservice=INFO
logging.level.org.springframework.web=INFO
spring.jpa.show-sql=false